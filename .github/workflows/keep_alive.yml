name: Streamlit Keep Alive

on:
  schedule:
    # 6시간마다 실행 (UTC 기준 0, 6, 12, 18시)
    - cron: '0 */6 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          # 여기에 실제 Streamlit 앱 URL을 입력하세요.
          # 예: https://chordgenerator.streamlit.app
          URL="${{ secrets.STREAMLIT_URL }}"
          if [ -z "$URL" ]; then
            echo "Error: STREAMLIT_URL secret is not set."
            echo "GitHub Repo Settings -> Secrets and variables -> Actions에서 STREAMLIT_URL을 추가해주세요."
            exit 1
          fi
          
          echo "Pinging $URL to keep it awake..."
          curl -sL --retry 3 --retry-delay 5 "$URL" > /dev/null
          echo "Done!"
